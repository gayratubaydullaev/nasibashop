syntax = "proto3";

package nasibashop.user.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nasibashop/nasibashop/packages/shared-proto/gen/go/user/v1;userv1";
option java_multiple_files = true;
option java_outer_classname = "UserProto";
option java_package = "uz.nasibashop.user.v1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc AddAddress(AddAddressRequest) returns (AddAddressResponse);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_SUPER_ADMIN = 1;
  USER_ROLE_STORE_MANAGER = 2;
  USER_ROLE_CUSTOMER = 3;
}

enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_PHONE = 1;
  AUTH_PROVIDER_EMAIL = 2;
}

message User {
  string id = 1;
  string phone = 2;
  string email = 3;
  string full_name = 4;
  string avatar_url = 5;
  repeated UserRole roles = 6;
  bool phone_verified = 7;
  bool email_verified = 8;
  bool is_active = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message UserClaims {
  string user_id = 1;
  string phone = 2;
  string email = 3;
  repeated UserRole roles = 4;
  int64 expires_at_unix = 5;
}

message Tokens {
  string access_token = 1;
  string refresh_token = 2;
  int32 access_expires_in_seconds = 3;
  int32 refresh_expires_in_seconds = 4;
  string token_type = 5;
}

message CreateUserRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  string phone = 2;
  string email = 3;
  string password = 4;
  string full_name = 5;
  repeated UserRole roles = 6;
}

message CreateUserResponse {
  User user = 1;
}

message AuthenticateRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  AuthProvider provider = 2;
  string phone = 3;
  string sms_code = 4;
  string email = 5;
  string password = 6;
  string device_id = 7;
  string user_agent = 8;
  string ip_address = 9;
}

message AuthenticateResponse {
  User user = 1;
  Tokens tokens = 2;
}

message ValidateTokenRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  string token = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  UserClaims claims = 2;
}

message GetUserRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  string id = 2;
}

message GetUserResponse {
  User user = 1;
}

message UpdateProfileRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  string id = 2;
  string full_name = 3;
  string email = 4;
  string phone = 5;
  string avatar_url = 6;
}

message UpdateProfileResponse {
  User user = 1;
}

message AddAddressRequest {
  nasibashop.common.v1.RequestMetadata metadata = 1;
  string user_id = 2;
  nasibashop.common.v1.Address address = 3;
}

message AddAddressResponse {
  nasibashop.common.v1.Address address = 1;
}
