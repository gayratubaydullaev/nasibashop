server:
  port: ${ORDER_SERVICE_PORT:8081}

spring:
  application:
    name: order-service

  datasource:
    url: ${ORDER_SERVICE_DATABASE_URL:jdbc:postgresql://localhost:5432/order_service}
    username: ${ORDER_SERVICE_DATABASE_USER:nasiba}
    password: ${ORDER_SERVICE_DATABASE_PASSWORD:nasiba_dev_password}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.apache.kafka: WARN

app:
  kafka:
    topics:
      order-created: order.created
      order-confirmed: order.confirmed
      order-status-changed: order.status.changed
      order-cancelled: order.cancelled
      payment-created: payment.created
      stock-reserved: stock.reserved
      payment-completed: payment.completed
