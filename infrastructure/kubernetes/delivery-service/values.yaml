replicaCount: 2

image:
  repository: ghcr.io/nasibashop/delivery-service
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8085

env:
  httpPort: "8085"
  kafkaBrokers: kafka.infrastructure.svc.cluster.local:9092
  kafkaTopicOrderConfirmed: order.confirmed
  kafkaTopicDeliveryCreated: delivery.created
  kafkaTopicDeliveryStatusChanged: delivery.status.changed

secrets:
  existingSecret: delivery-service-secrets
  databaseUrlKey: DATABASE_URL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
