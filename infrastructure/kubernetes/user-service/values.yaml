replicaCount: 2

image:
  repository: ghcr.io/nasibashop/user-service
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  sidecar.istio.io/inject: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090

env:
  appEnv: production
  logLevel: info
  httpPort: "8080"
  grpcPort: "9090"
  redisAddr: redis-master.infrastructure.svc.cluster.local:6379
  kafkaBrokers: kafka.infrastructure.svc.cluster.local:9092

secrets:
  existingSecret: user-service-secrets
  databaseUrlKey: DATABASE_URL
  jwtPublicKeyKey: JWT_PUBLIC_KEY
  jwtPrivateKeyKey: JWT_PRIVATE_KEY

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
