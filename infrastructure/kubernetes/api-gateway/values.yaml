replicaCount: 2

image:
  repository: kong
  pullPolicy: IfNotPresent
  tag: "3.7"

nameOverride: ""
fullnameOverride: ""

# HTTP upstreams (same namespace by default). Override for host-gateway / mesh.
upstreams:
  user:
    host: user-service
    port: 8080
  product:
    host: product-service
    port: 8083
  order:
    host: order-service
    port: 8081
  payment:
    host: payment-service
    port: 8082
  delivery:
    host: delivery-service
    port: 8085
  search:
    host: search-service
    port: 8086
  notification:
    host: notification-service
    port: 8087
  media:
    host: media-service
    port: 8088

jwt:
  consumerUsername: nasibashop-dev
  jwtKey: nasibashop-user-service
  rsaPublicKey: |
