cors:
  origins:
    - http://localhost:3000
    - http://localhost:3001
    - http://127.0.0.1:3000
    - http://127.0.0.1:3001

service:
  type: ClusterIP
  proxyPort: 8000

admin:
  enabled: false
  port: 8001

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10

podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
