# Bir nechta replika + mahalliy disk: har bir Pod o‘z emptyDir’ida. Production uchun S3/MinIO ishlating va replicaCount ni oshiring.
replicaCount: 1

image:
  repository: ghcr.io/nasibashop/media-service
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  httpPort: 8088

env:
  httpPort: "8088"
  kafkaBrokers: kafka.infrastructure.svc.cluster.local:9092
  kafkaTopicMediaUploaded: media.uploaded
  kafkaTopicMediaProcessed: media.processed
  mediaLocalDir: /data/media
  mediaMaxUploadBytes: "33554432"

secrets:
  existingSecret: media-service-secrets
  databaseUrlKey: DATABASE_URL

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
