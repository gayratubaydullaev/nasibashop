services:
  postgres:
    image: postgres:16-alpine
    container_name: nasibashop-postgres
    environment:
      POSTGRES_USER: nasiba
      POSTGRES_PASSWORD: nasiba_dev_password
      POSTGRES_DB: nasibashop
      POSTGRES_MULTIPLE_DATABASES: user_service,product_service,order_service,payment_service,delivery_service,media_service
    ports:
      - "${NASIBASHOP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nasiba -d nasibashop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasibashop

  redis:
    image: redis:7-alpine
    container_name: nasibashop-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${NASIBASHOP_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasibashop

  kafka:
    # bitnami/kafka:3.7 удалён с Docker Hub; KRaft-образы — в bitnamilegacy (см. https://hub.docker.com/r/bitnamilegacy/kafka/tags )
    image: bitnamilegacy/kafka:3.7.1-debian-12-r9
    container_name: nasibashop-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${NASIBASHOP_KAFKA_PORT_9092:-9092}:9092"
      - "${NASIBASHOP_KAFKA_PORT_9094:-9094}:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - nasibashop

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: nasibashop-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: nasibashop_meili_dev_master_key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${NASIBASHOP_MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasibashop

  mongo:
    image: mongo:7
    container_name: nasibashop-mongo
    ports:
      - "${NASIBASHOP_MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasibashop

  consul:
    image: hashicorp/consul:1.18
    container_name: nasibashop-consul
    command:
      - agent
      - -dev
      - -client=0.0.0.0
      - -ui
    ports:
      - "${NASIBASHOP_CONSUL_HTTP_PORT:-8500}:8500"
      - "${NASIBASHOP_CONSUL_DNS_UDP_PORT:-8600}:8600/udp"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nasibashop

  kong:
    image: kong:3.7
    container_name: nasibashop-kong
    environment:
      KONG_DATABASE: "off"
      # Полный бэкенд в Docker: задайте в `.env` путь к `services/api-gateway/declarative/kong.docker.yml`
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NASIBASHOP_KONG_PROXY_PORT:-8000}:8000"
      - "${NASIBASHOP_KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ${KONG_DECLARATIVE_CONFIG_FILE:-./services/api-gateway/declarative/kong.yml}:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nasibashop

networks:
  nasibashop:
    name: nasibashop
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  meilisearch_data:
  mongo_data:
