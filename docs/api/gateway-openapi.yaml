openapi: 3.0.3
info:
  title: NasibaShop API (via Kong Gateway)
  description: |
    Единая точка входа для клиентов. Базовый URL в локальной разработке: `http://localhost:8000`.
    Пути соответствуют маршрутизации Kong (`services/api-gateway/declarative/kong.yml`).
  version: 0.1.0
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: Локальный Kong proxy

tags:
  - name: Auth
  - name: Users
  - name: Products
  - name: Categories
  - name: Orders
  - name: Payments
  - name: Delivery
  - name: Search
  - name: Notifications
  - name: Media

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация (email/пароль)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Создано
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Вход
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Токены
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access-токена
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/auth/validate:
    post:
      tags: [Auth]
      summary: Проверка токена
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/users/{id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Профиль пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Пользователь
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Обновление профиля
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/users/{id}/addresses:
    post:
      tags: [Users]
      summary: Добавить адрес
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Создано

  /api/products:
    get:
      tags: [Products]
      summary: Список товаров
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: string }
        - name: storeId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, example: ACTIVE }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Список и пагинация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      tags: [Products]
      summary: Создать товар
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Создано

  /api/products/{id}:
    parameters:
      - $ref: "#/components/parameters/ProductId"
    get:
      tags: [Products]
      summary: Товар с категорией и остатками
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: "#/components/schemas/ProductFull"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Products]
      summary: Обновить товар
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: OK
    delete:
      tags: [Products]
      summary: Удалить товар
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Удалено

  /api/products/{id}/stock:
    patch:
      tags: [Products]
      summary: Обновить остаток
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                variantId: { type: string }
                storeId: { type: string }
                quantity: { type: integer }
      responses:
        "200":
          description: OK

  /api/categories:
    get:
      tags: [Categories]
      summary: Дерево категорий
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
    post:
      tags: [Categories]
      summary: Создать категорию
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Category"
      responses:
        "201":
          description: Создано

  /api/orders:
    get:
      tags: [Orders]
      summary: Все заказы (админ, пагинация Spring Data)
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Страница заказов
    post:
      tags: [Orders]
      summary: Создать заказ (Saga)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Заказ создан

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Получить заказ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/my:
    get:
      tags: [Orders]
      summary: Мои заказы
      parameters:
        - name: userId
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Страница заказов

  /api/orders/store/{storeId}:
    get:
      tags: [Orders]
      summary: Заказы магазина
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Смена статуса заказа
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK

  /api/orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Отмена заказа
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: OK

  /api/payments:
    get:
      tags: [Payments]
      summary: Список платежей (админ)
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Страница платежей

  /api/payments/create:
    post:
      tags: [Payments]
      summary: Создать платёж
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Создано

  /api/payments/{id}/status:
    get:
      tags: [Payments]
      summary: Статус платежа
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Возврат
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/payments/payme/callback:
    post:
      tags: [Payments]
      summary: Webhook Payme
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/payments/click/callback:
    post:
      tags: [Payments]
      summary: Webhook Click
      responses:
        "200":
          description: OK

  /api/payments/uzcard/callback:
    post:
      tags: [Payments]
      summary: Webhook Uzcard
      responses:
        "200":
          description: OK

  /api/delivery/stores:
    get:
      tags: [Delivery]
      summary: Список точек
      responses:
        "200":
          description: OK
    post:
      tags: [Delivery]
      summary: Создать точку
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: OK

  /api/delivery/stores/nearest:
    get:
      tags: [Delivery]
      summary: Ближайшая точка
      parameters:
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
      responses:
        "200":
          description: OK

  /api/delivery/calculate:
    post:
      tags: [Delivery]
      summary: Расчёт доставки
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/delivery/zones:
    post:
      tags: [Delivery]
      summary: Добавить зону
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: OK

  /api/delivery/{id}:
    get:
      tags: [Delivery]
      summary: Карточка доставки
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/delivery/{id}/status:
    patch:
      tags: [Delivery]
      summary: Статус доставки
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK

  /api/delivery/{id}/tracking:
    get:
      tags: [Delivery]
      summary: История трека
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/search:
    get:
      tags: [Search]
      summary: Поиск товаров (Meilisearch)
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Результаты поиска

  /api/search/suggest:
    get:
      tags: [Search]
      summary: Подсказки
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/search/reindex:
    post:
      tags: [Search]
      summary: Полная переиндексация (админ)
      responses:
        "200":
          description: OK

  /api/notifications/history:
    get:
      tags: [Notifications]
      summary: История уведомлений
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /api/notifications/send:
    post:
      tags: [Notifications]
      summary: Внутренняя отправка уведомления
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: OK

  /api/media/upload:
    post:
      tags: [Media]
      summary: Загрузка изображения
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Метаданные файла
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/media/{id}:
    get:
      tags: [Media]
      summary: Получить файл (опционально width, height, format)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: width
          in: query
          schema: { type: integer }
        - name: height
          in: query
          schema: { type: integer }
        - name: format
          in: query
          schema: { type: string, enum: [jpeg, png, webp] }
      responses:
        "200":
          description: Бинарное тело изображения
          content:
            image/jpeg: {}
            image/png: {}
            image/webp: {}
    delete:
      tags: [Media]
      summary: Удалить файл
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Удалено

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token от user-service

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Не авторизован
    NotFound:
      description: Не найденo
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Category:
      type: object
      properties:
        id: { type: string }
        parentId: { type: string }
        slug: { type: string }
        nameUz: { type: string }
        sortOrder: { type: integer }
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    Product:
      type: object
      properties:
        id: { type: string }
        storeId: { type: string }
        categoryId: { type: string }
        titleUz: { type: string }
        descriptionUz: { type: string }
        brand: { type: string }
        priceUnits: { type: integer, format: int64 }
        currencyCode: { type: string }
        discountPercent: { type: integer }
        status: { type: string }

    ProductFull:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/Product"
        category:
          $ref: "#/components/schemas/Category"
        stocks:
          type: array
          items:
            type: object

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          type: object
          properties:
            totalCount:
              type: integer
